<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vishnu R | Portfolio</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --primary: #4f46e5;
    }

    body.dark {
      --bg: #111;
      --text: #fff;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      scroll-behavior: smooth;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 5rem;
      position: sticky;
      top: 0;
      background: var(--bg);
    }

    nav ul {
      display: flex;
      gap: 1rem;
      list-style: none;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
    }

    section {
      padding: 80px 20px;
      max-width: 900px;
      margin: auto;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    button {
      cursor: pointer;
      width: 150px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #5a95ed;
      outline: none;
      color: white;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, textarea {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .fade {
      opacity: 0;
      transform: translateY(20px);
      transition: 0.6s;
    }

    .fade.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<header>
  <h1>Vishnu R</h1>
  <nav>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  <button onclick="toggleTheme()">🌙</button>
</header>

<section id="about" class="fade">
  <h2>About</h2>
  <p>Hi, I'm Vishnu R, a UI/UX Designer and Developer creating user-friendly digital experiences.</p>
</section>

<section id="projects" class="fade">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Portfolio Website</h3>
      <p>Responsive personal portfolio.</p>
    </div>
    <div class="card">
      <h3>Login UI</h3>
      <p>Modern login interface design.</p>
    </div>
  </div>
</section>

<section id="contact" class="fade">
  <h2>Contact</h2>
  <form action="https://formspree.io/f/mqegagwy" method="POST">
    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button type="submit" class="w-5">Send</button>
  </form>
</section>

<script>
  function toggleTheme() {
    document.body.classList.toggle('dark');
  }

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('show');
      }
    });
  });

  document.querySelectorAll('.fade').forEach(el => observer.observe(el));
</script>

</body>
</html>
