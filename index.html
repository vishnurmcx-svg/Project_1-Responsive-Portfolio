<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Vishnu R | Portfolio</title>

  
</head>

<body>

<header>
  <h1>Vishnu R</h1>
  <nav>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  <button onclick="toggleTheme()">🌙</button>
</header>

<section id="about" class="fade">
  <h2>About</h2>
  <p>Hi, I'm Vishnu R, a UI/UX Designer and Developer creating user-friendly digital experiences.</p>
</section>

<section id="projects" class="fade">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Portfolio Website</h3>
      <p>Responsive personal portfolio.</p>
    </div>
    <div class="card">
      <h3>Login UI</h3>
      <p>Modern login interface design.</p>
    </div>
  </div>
</section>

<section id="contact" class="fade">
  <h2>Contact</h2>
  <form action="https://formspree.io/f/mqegagwy" method="POST">
    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button type="submit" class="w-5">Send</button>
  </form>
</section>
<script src="./app.js"></script>
</body>
</html>
